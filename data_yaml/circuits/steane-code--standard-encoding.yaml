  Encoding circuit for the [[7,1,3]] Steane code using 9 CNOT gates arranged in depth 5.
  Based on the original construction from Steane (1996).
  This circuit prepares the logical |0> state from a single physical |0> input qubit and six ancilla qubits initialized to |0>.
