name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  no-private-registries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Forbid private artifactory references
        run: |
          if git grep -n -F 'jfrog.io' -- ':!.github/workflows/ci.yml'; then
            echo "::error::Found jfrog.io references. QECirc must only use public registries (PyPI, npm)."
            exit 1
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run validate:yaml
      - run: npm run build
      - name: Start server
        run: |
          node ./dist/server/entry.mjs &
          echo $! > server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:4321/ > /dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s"; exit 1
        env:
          PORT: 4321
      - name: Run smoke tests
        run: ./scripts/smoke.sh
      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.x"
          python-version: "3.13"
      - run: uv lock --check
        env:
          UV_NO_CONFIG: "1"
      - run: uv sync
      - run: uv run ruff check scripts/
      - run: uv run ruff format --check scripts/
      - run: uv run pytest --cov=scripts/add_circuit --cov-fail-under=60
