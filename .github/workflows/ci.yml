name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  no-private-registries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Forbid private artifactory references
        run: |
          if git grep -n -F 'jfrog.io' -- ':!.github/workflows/ci.yml'; then
            echo "::error::Found jfrog.io references. QECirc must only use public registries (PyPI, npm)."
            exit 1
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run validate:yaml
      - run: npm run build
      - name: Start server
        run: |
          node ./dist/server/entry.mjs &
          echo $! > server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:4321/ > /dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s"; exit 1
        env:
          PORT: 4321
      - name: Run smoke tests
        run: ./scripts/smoke.sh
      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.x"
          python-version: "3.13"
      - run: uv lock --check
        env:
          UV_NO_CONFIG: "1"
      - run: uv sync
      - run: uv run ruff check scripts/
      - run: uv run ruff format --check scripts/
      - run: uv run pytest --cov=scripts/add_circuit --cov-fail-under=60
