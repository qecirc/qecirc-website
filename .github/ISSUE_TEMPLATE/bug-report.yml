name: Bug Report
description: Report something that isn't working correctly.
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL / page
      description: Where on the site did you see this?
      placeholder: "https://qecirc.com/codes/steane-code"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: false
