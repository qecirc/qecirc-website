<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <style>
    @media (prefers-color-scheme: dark) {
      .wire { stroke: #e5e7eb; }
      .gate { fill: #e5e7eb; }
      .label { fill: #111827; }
    }
  </style>

  <!-- Top wire -->
  <line class="wire" x1="0" y1="22" x2="64" y2="22" stroke="#111827" stroke-width="4" stroke-linecap="round"/>

  <!-- Bottom wire -->
  <line class="wire" x1="0" y1="42" x2="64" y2="42" stroke="#111827" stroke-width="4" stroke-linecap="round"/>

  <!-- Two-qubit gate box spanning both wires -->
  <rect class="gate" x="12" y="10" width="40" height="44" rx="4" fill="#111827" stroke="none"/>

  <!-- Q label -->
  <text class="label" x="32" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="36" fill="white">Q</text>
</svg>
